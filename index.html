<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Repro Cart Library</title>
<style>
  :root{
    --bg:#0f1320; --panel:#171c2e; --panel2:#1e2438; --line:#2c3450;
    --text:#e7ecf6; --muted:#94a0bd; --accent:#5b8cff; --accent2:#7c5bff;
    --chip:#26304d; --good:#34d399; --warn:#fbbf24; --err:#ff6b6b;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(160deg,#0c1020,#131a2e 60%,#0c1020);
    color:var(--text); min-height:100vh;
  }
  header.top{
    padding:18px 22px; border-bottom:1px solid var(--line);
    display:flex; align-items:baseline; gap:14px; flex-wrap:wrap;
    background:rgba(10,14,28,.6); position:sticky; top:0; z-index:20; backdrop-filter:blur(8px);
  }
  header.top h1{font-size:20px;margin:0;letter-spacing:.3px}
  header.top .sub{color:var(--muted);font-size:13px}
  .layout{display:flex; align-items:flex-start; gap:0}
  aside{
    width:300px; flex:0 0 300px; padding:18px; border-right:1px solid var(--line);
    position:sticky; top:61px; height:calc(100vh - 61px); overflow-y:auto;
  }
  main{flex:1; padding:18px 22px; min-width:0}
  .field{margin-bottom:18px}
  .field label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:7px}
  input[type=search], select{
    width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--line);
    background:var(--panel2); color:var(--text); font-size:14px; outline:none;
  }
  input[type=search]:focus, select:focus{border-color:var(--accent)}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{
    padding:6px 11px;border-radius:999px;border:1px solid var(--line);background:var(--chip);
    color:var(--text);font-size:12.5px;cursor:pointer;user-select:none;transition:.12s;
  }
  .chip:hover{border-color:var(--accent)}
  .chip.active{background:var(--accent);border-color:var(--accent);color:#0b1020;font-weight:600}
  .reset{
    width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);
    background:transparent;color:var(--muted);cursor:pointer;font-size:13px;margin-top:4px
  }
  .reset:hover{color:var(--text);border-color:var(--accent)}
  .count{color:var(--muted);font-size:13px;margin:2px 0 16px}
  .count b{color:var(--text)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
  .card{
    background:linear-gradient(180deg,var(--panel),var(--panel2));
    border:1px solid var(--line);border-radius:14px;padding:15px 16px;display:flex;flex-direction:column;gap:9px;
  }
  .card h3{margin:0;font-size:16px;line-height:1.3}
  .card .raw{color:var(--muted);font-size:12px;margin-top:-4px}
  .badges{display:flex;flex-wrap:wrap;gap:6px}
  .badge{font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid var(--line);white-space:nowrap}
  .b-console{background:rgba(91,140,255,.14);border-color:rgba(91,140,255,.5);color:#aec4ff}
  .b-type{background:rgba(124,91,255,.14);border-color:rgba(124,91,255,.5);color:#c6b6ff}
  .b-hack{background:rgba(52,211,153,.12);border-color:rgba(52,211,153,.45);color:#8ff0ce}
  .desc{color:#cdd6ea;font-size:13.5px;line-height:1.5}
  mark{background:#f6d35b;color:#241c00;border-radius:3px;padding:0 1px}
  .empty{color:var(--muted);padding:40px 0;text-align:center}
  .notice{
    border:1px solid var(--line);background:var(--panel);border-radius:12px;
    padding:16px 18px;margin-bottom:16px;line-height:1.55;font-size:14px;
  }
  .notice.err{border-color:rgba(255,107,107,.5);background:rgba(255,107,107,.08)}
  .notice b{color:var(--text)}
  .notice code{background:#0c1020;border:1px solid var(--line);padding:2px 6px;border-radius:6px;font-size:12.5px}
  .loadbtn{
    display:inline-block;margin-top:10px;padding:9px 14px;border-radius:10px;
    border:1px solid var(--accent);background:var(--accent);color:#0b1020;font-weight:600;
    cursor:pointer;font-size:13px;
  }
  .loadbtn:hover{filter:brightness(1.08)}
  @media(max-width:860px){
    .layout{flex-direction:column}
    aside{position:relative;top:0;height:auto;width:100%;flex:none;border-right:none;border-bottom:1px solid var(--line)}
  }
</style>
</head>
<body>
<header class="top">
  <h1>&#x1F3AE; Repro Cart Library</h1>
  <span class="sub" id="tagline">Loading data&hellip;</span>
</header>
<div class="layout">
  <aside>
    <div class="field">
      <label for="q">Keyword search</label>
      <input type="search" id="q" placeholder="Name, description, anything&hellip;" autocomplete="off">
    </div>
    <div class="field">
      <label>Console</label>
      <div class="chips" id="consoleChips"></div>
    </div>
    <div class="field">
      <label for="type">Type</label>
      <select id="type"></select>
    </div>
    <div class="field">
      <label for="hackof">Hack of (base game)</label>
      <select id="hackof"></select>
    </div>
    <button class="reset" id="reset">Clear all filters</button>
  </aside>
  <main>
    <div id="status"></div>
    <div class="count" id="count"></div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none">No games match your filters.</div>
  </main>
</div>

<!-- hidden file input for manual CSV loading (works when opened from disk) -->
<input type="file" id="filein" accept=".csv" style="display:none">

<script>
// ---- CONFIG: the spreadsheet this app reads from ----
const CSV_FILE = "Repro Info System - Sheet1.csv";

let DATA = [];
const state = {q:"", consoles:new Set(), type:"", hackof:""};

// ---------- CSV parser (handles quotes, commas & newlines in fields) ----------
function parseCSV(text){
  const rows=[]; let row=[], field="", i=0, inQ=false;
  if(text.charCodeAt(0)===0xFEFF) text=text.slice(1); // strip BOM
  while(i<text.length){
    const c=text[i];
    if(inQ){
      if(c==='"'){ if(text[i+1]==='"'){field+='"';i+=2;continue;} inQ=false;i++;continue; }
      field+=c;i++;continue;
    }
    if(c==='"'){inQ=true;i++;continue;}
    if(c===','){row.push(field);field="";i++;continue;}
    if(c==='\r'){i++;continue;}
    if(c==='\n'){row.push(field);rows.push(row);row=[];field="";i++;continue;}
    field+=c;i++;
  }
  if(field!==""||row.length){row.push(field);rows.push(row);}
  return rows;
}

function rowsToData(rows){
  if(!rows.length) return [];
  const head=rows[0].map(h=>h.trim().toLowerCase());
  const idx=n=>head.indexOf(n);
  const iC=idx("console"), iG=idx("game"), iN=idx("proper name"),
        iT=idx("type"), iH=idx("hack of"), iD=idx("description");
  const out=[];
  for(let r=1;r<rows.length;r++){
    const row=rows[r];
    if(!row.length) continue;
    const console=(row[iC]||"").trim();
    if(!console || console.toUpperCase()==="TOTAL") continue;
    out.push({
      console,
      raw:(row[iG]||"").trim(),
      name:(row[iN]||"").trim(),
      type:(row[iT]||"").trim(),
      hackOf:(row[iH]||"").trim(),
      desc:(row[iD]||"").trim()
    });
  }
  return out;
}

// ---------- load ----------
function boot(data){
  DATA=data;
  document.getElementById("status").innerHTML="";
  const consoles=[...new Set(DATA.map(d=>d.console))];
  document.getElementById("tagline").textContent =
    DATA.length + " games • " + consoles.length + " systems • reproduction cartridge catalog";
  buildFilters();
  render();
}

async function tryFetch(){
  try{
    const res=await fetch(encodeURI(CSV_FILE), {cache:"no-store"});
    if(!res.ok) throw new Error("HTTP "+res.status);
    const text=await res.text();
    const data=rowsToData(parseCSV(text));
    if(!data.length) throw new Error("No rows parsed");
    boot(data);
  }catch(e){
    showLoadHelp(e);
  }
}

function showLoadHelp(e){
  document.getElementById("tagline").textContent="Data not loaded";
  document.getElementById("status").innerHTML =
    '<div class="notice err"><b>Couldn’t auto-load <code>'+CSV_FILE+'</code>.</b><br>'
    +'Browsers block reading local files when you open this page directly from your disk (the <code>file://</code> restriction). '
    +'This works automatically once the page is hosted (e.g. GitHub Pages) or served locally.<br>'
    +'In the meantime, load the spreadsheet manually:'
    +'<br><button class="loadbtn" id="pick">Choose CSV file&hellip;</button></div>';
  document.getElementById("pick").onclick=()=>document.getElementById("filein").click();
}

document.getElementById("filein").addEventListener("change", ev=>{
  const f=ev.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{ boot(rowsToData(parseCSV(r.result))); }catch(e){ alert("Could not parse CSV: "+e.message);} };
  r.readAsText(f);
});

// ---------- filters & rendering ----------
function buildFilters(){
  const consoles=[...new Set(DATA.map(d=>d.console))];
  const types=[...new Set(DATA.map(d=>d.type).filter(Boolean))].sort();
  const hacks=[...new Set(DATA.filter(d=>d.hackOf).map(d=>d.hackOf))].sort();

  const cc=document.getElementById("consoleChips"); cc.innerHTML="";
  consoles.forEach(c=>{
    const el=document.createElement("div");
    el.className="chip"; el.textContent=c;
    el.onclick=()=>{ el.classList.toggle("active");
      if(state.consoles.has(c)) state.consoles.delete(c); else state.consoles.add(c);
      render(); };
    cc.appendChild(el);
  });
  fillSelect("type", types, "All types");
  fillSelect("hackof", hacks, "All base games");
}
function fillSelect(id, items, allLabel){
  const s=document.getElementById(id);
  s.innerHTML="<option value=''>"+allLabel+"</option>"+
    items.map(i=>"<option>"+esc(i)+"</option>").join("");
}

function esc(s){return (s||"").replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hl(s){
  s=esc(s);
  if(!state.q) return s;
  const terms=state.q.split(/\s+/).filter(Boolean).map(t=>t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'));
  if(!terms.length) return s;
  return s.replace(new RegExp("("+terms.join("|")+")","gi"),"<mark>$1</mark>");
}
function matches(d){
  if(state.consoles.size && !state.consoles.has(d.console)) return false;
  if(state.type && d.type!==state.type) return false;
  if(state.hackof && d.hackOf!==state.hackof) return false;
  if(state.q){
    const hay=(d.name+" "+d.raw+" "+d.console+" "+d.type+" "+d.hackOf+" "+d.desc).toLowerCase();
    if(!state.q.split(/\s+/).filter(Boolean).every(t=>hay.includes(t))) return false;
  }
  return true;
}
function render(){
  const grid=document.getElementById("grid");
  const res=DATA.filter(matches);
  document.getElementById("count").innerHTML="Showing <b>"+res.length+"</b> of "+DATA.length+" games";
  document.getElementById("empty").style.display=res.length?"none":"block";
  grid.innerHTML=res.map(d=>{
    const hack=d.hackOf?'<span class="badge b-hack">Hack of: '+esc(d.hackOf)+'</span>':'';
    return '<div class="card">'
      +'<h3>'+hl(d.name)+'</h3>'
      +'<div class="raw">'+hl(d.raw)+'</div>'
      +'<div class="badges">'
        +'<span class="badge b-console">'+esc(d.console)+'</span>'
        +'<span class="badge b-type">'+esc(d.type)+'</span>'+hack
      +'</div>'
      +'<div class="desc">'+hl(d.desc)+'</div>'
    +'</div>';
  }).join("");
}

// wire controls
document.getElementById("q").addEventListener("input", e=>{state.q=e.target.value.trim().toLowerCase(); render();});
document.getElementById("type").addEventListener("change", e=>{state.type=e.target.value; render();});
document.getElementById("hackof").addEventListener("change", e=>{state.hackof=e.target.value; render();});
document.getElementById("reset").addEventListener("click", ()=>{
  state.q=""; state.consoles.clear(); state.type=""; state.hackof="";
  document.getElementById("q").value="";
  document.getElementById("type").value="";
  document.getElementById("hackof").value="";
  document.querySelectorAll(".chip.active").forEach(c=>c.classList.remove("active"));
  render();
});

tryFetch();
</script>
</body>
</html>
